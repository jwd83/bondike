<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Binary Klondike</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="toolbar">
        <div class="title-block">
          <h1>Binary Klondike</h1>
          <p>Klondike solitaire with 4-bit ranks (Ace = 0001, King = 1101)</p>
        </div>
        <div class="toolbar-actions">
          <button id="new-game-btn" type="button">New Game</button>
          <button id="auto-btn" type="button">Auto to Foundation</button>
        </div>
      </header>
      <canvas
        id="game-canvas"
        width="1200"
        height="820"
        aria-label="Binary Klondike game board"
      ></canvas>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
