<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bondike</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game">
        <div id="top-row">
            <div id="stock" class="pile stock-pile"></div>
            <div id="waste" class="pile waste-pile"></div>
            <div class="spacer"></div>
            <div id="foundation-0" class="pile foundation-pile" data-index="0"></div>
            <div id="foundation-1" class="pile foundation-pile" data-index="1"></div>
            <div id="foundation-2" class="pile foundation-pile" data-index="2"></div>
            <div id="foundation-3" class="pile foundation-pile" data-index="3"></div>
        </div>

        <div id="tableau">
            <div id="tableau-0" class="pile tableau-pile" data-index="0"></div>
            <div id="tableau-1" class="pile tableau-pile" data-index="1"></div>
            <div id="tableau-2" class="pile tableau-pile" data-index="2"></div>
            <div id="tableau-3" class="pile tableau-pile" data-index="3"></div>
            <div id="tableau-4" class="pile tableau-pile" data-index="4"></div>
            <div id="tableau-5" class="pile tableau-pile" data-index="5"></div>
            <div id="tableau-6" class="pile tableau-pile" data-index="6"></div>
        </div>

        <div id="controls">
            <button id="new-game-btn">New Game</button>
            <button id="undo-btn">Undo</button>
            <span id="move-counter">Moves: 0</span>
        </div>
    </div>

    <div id="win-overlay" class="hidden">
        <div id="win-message">
            <h1>YOU WIN</h1>
            <p>01010111 01001001 01001110</p>
            <button id="play-again-btn">Play Again</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
