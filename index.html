<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Binary Klondike</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="toolbar">
        <div class="title-block">
          <p class="eyebrow">A solitaire experiment</p>
          <h1>Binary Klondike</h1>
          <p>Klondike with 4-bit ranks using the local APL386 font and suit glyphs.</p>
        </div>
        <div class="toolbar-actions">
          <button id="new-game-btn" type="button">New Game</button>
          <button id="auto-btn" type="button">Auto to Foundation</button>
          <button id="safe-auto-btn" type="button">Auto-Complete Safe</button>
          <button id="fullscreen-btn" type="button">Fullscreen</button>
        </div>
      </header>
      <section class="canvas-stage" aria-label="Game board stage">
        <div class="stage-glow" aria-hidden="true"></div>
        <canvas
          id="game-canvas"
          width="920"
          height="820"
          aria-label="Binary Klondike game board"
        ></canvas>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
